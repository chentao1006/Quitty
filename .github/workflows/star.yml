name: Star Notify

on:
  watch:
    types: [started]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Telegram API
        run: |
          curl -X POST "https://api.ct106.cc/telegram" \
          -H "Content-Type: application/json" \
          -d "⭐ 项目 ${{ github.event.repository.name }} 当前 Star 数：${{ github.event.repository.stargazers_count }}"
